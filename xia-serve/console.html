<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XIA Sandbox — Ubuntu console</title>
<style>
  html, body { height: 100%; margin: 0; background: #0b0e14; color: #c9d1d9; }
  body { font: 14px/1.45 ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; display: flex; flex-direction: column; }
  #bar { padding: 6px 12px; background: #11161f; border-bottom: 1px solid #222b38; color: #8b949e; font-size: 12px; display: flex; gap: 14px; align-items: center; }
  #bar b { color: #c9d1d9; } #bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #d29922; display: inline-block; }
  #bar .dot.ok { background: #2ea043; } #bar .dot.err { background: #f85149; }
  #term { flex: 1; overflow-y: auto; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  #term .cmd { color: #58a6ff; } #term .err { color: #f85149; } #term .sys { color: #8b949e; }
  #form { display: flex; padding: 8px 12px; border-top: 1px solid #222b38; background: #0b0e14; }
  #ps1 { color: #2ea043; white-space: pre; }
  #in { flex: 1; background: transparent; border: 0; color: #c9d1d9; font: inherit; outline: none; margin-left: 8px; }
  a { color: #58a6ff; }
</style>
</head>
<body>
  <div id="bar"><span class="dot" id="dot"></span><b>XIA Sandbox</b>
    <span id="status">booting…</span>
    <span style="margin-left:auto" id="net"></span>
    <a href="/__control" target="_blank">control</a></div>
  <div id="term"></div>
  <form id="form" autocomplete="off"><span id="ps1">…</span><input id="in" autofocus spellcheck="false" disabled></form>

<script type="module">
const term = document.getElementById('term'), input = document.getElementById('in');
const ps1El = document.getElementById('ps1'), statusEl = document.getElementById('status');
const dot = document.getElementById('dot'), netEl = document.getElementById('net');
let cwd = '/root', ready = false, busy = false;
const history = []; let hi = -1;

function out(text, cls) {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text;
  term.appendChild(span); term.scrollTop = term.scrollHeight;
}
function disp(p) { return p === '/root' ? '~' : (p.startsWith('/root/') ? '~' + p.slice(5) : p); }
function setPrompt() { ps1El.textContent = `root@xia-sandbox:${disp(cwd)}$ `; }

const worker = new Worker(new URL('./fullruntime-worker.mjs', import.meta.url), { type: 'module' });
const pending = new Map(); let nextId = 1;

worker.onmessage = async (e) => {
  const m = e.data;
  if (m.type === 'boot') {
    out('Loading XIA Sandbox — translating Ubuntu userland to WebAssembly…\n', 'sys');
    // externalize the CA: never use a baked secret — use the operator's, or none.
    let netProxy = null, tlsCa;
    try { const s = await (await fetch('/__api/status')).json(); if (s.egress) netProxy = '/__net'; } catch {}
    try { if ((await fetch('/__tls-ca.json', { method: 'HEAD' })).ok) tlsCa = '__tls-ca.json'; } catch {}
    const mf = await (await fetch('./manifest.json')).json();
    delete mf.tlsCa;                       // drop any baked CA reference
    netEl.textContent = netProxy ? 'network: on' : 'network: off';
    worker.postMessage({ type: 'init', assetBase: './', manifest: mf, netProxy, tlsCa, persist: true });
    return;
  }
  if (m.type === 'log') { statusEl.textContent = m.msg; return; }
  if (m.type === 'ready') {
    ready = true; dot.className = 'dot ok'; statusEl.textContent = 'ready · Ubuntu 24.04 userland';
    out('\nUbuntu 24.04 LTS  (XIA Sandbox — runs entirely in your browser, on your device)\n', 'sys');
    out("Type a command and press Enter.  Try:  uname -a   ·   python3 --version   ·   ls -la /\n\n", 'sys');
    input.disabled = false; setPrompt(); input.focus();
    return;
  }
  if (m.type === 'result') {
    const p = pending.get(m.id); pending.delete(m.id);
    let so = m.stdout || '';
    const mk = so.match(/\x01CWD\x01([^\x01]*)\x01/);
    if (mk) { if (mk[1]) cwd = mk[1]; so = so.replace(/\x01CWD\x01[^\x01]*\x01\n?/, ''); }
    if (so) out(so + (so.endsWith('\n') ? '' : '\n'));
    if (m.stderr) out(m.stderr + (m.stderr.endsWith('\n') ? '' : '\n'), 'err');
    if (m.exit !== 0) out(`[exit ${m.exit}${m.reason ? ' · ' + m.reason : ''}]\n`, 'sys');
    busy = false; input.disabled = false; setPrompt(); input.focus();
    if (p && p.done) p.done();
    return;
  }
};

function shq(s) { return "'" + String(s).replace(/'/g, "'\\''") + "'"; }
function runCommand(cmd) {
  const id = nextId++;
  // track cwd across one-shot processes (env/exports don't persist; files do, via overlay)
  const wrapped = `cd ${shq(cwd)} >/dev/null 2>&1; { ${cmd}\n}; __rc=$?; printf '\\001CWD\\001%s\\001\\n' "$(pwd)"; exit $__rc`;
  pending.set(id, {});
  worker.postMessage({ type: 'run', id, core: 'bash', argv: ['bash', '-lc', wrapped] });
}

document.getElementById('form').addEventListener('submit', (e) => {
  e.preventDefault();
  if (!ready || busy) return;
  const cmd = input.value;
  out(ps1El.textContent, 'sys'); out(cmd + '\n', 'cmd');
  input.value = '';
  if (!cmd.trim()) { setPrompt(); return; }
  if (cmd.trim() === 'clear') { term.textContent = ''; setPrompt(); return; }
  history.push(cmd); hi = history.length;
  busy = true; input.disabled = true; statusEl.textContent = 'running…';
  runCommand(cmd);
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') { if (hi > 0) { hi--; input.value = history[hi]; e.preventDefault(); } }
  else if (e.key === 'ArrowDown') { if (hi < history.length - 1) { hi++; input.value = history[hi]; } else { hi = history.length; input.value = ''; } }
});
</script>
</body>
</html>
